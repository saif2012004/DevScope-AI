services:
  postgres:
    image: postgres:15-alpine
    container_name: devscope_postgres
    environment:
      POSTGRES_USER: devscope
      POSTGRES_PASSWORD: devscope
      POSTGRES_DB: devscope_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devscope_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    profiles:
      - full
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devscope_api
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://devscope:devscope@postgres:5432/devscope_db
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  web:
    profiles:
      - full
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devscope_web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}

volumes:
  postgres_data:
  redis_data:
