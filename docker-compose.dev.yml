# Development stack: postgres + redis + web + API with host bind mounts and dev commands.
# Usage: docker compose -f docker-compose.dev.yml up
# Run `npm ci` at the repository root on the host first (or the start script will run `npm install`).

services:
  postgres:
    image: postgres:15-alpine
    container_name: devscope_postgres_dev
    environment:
      POSTGRES_USER: devscope
      POSTGRES_PASSWORD: devscope
      POSTGRES_DB: devscope_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devscope_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

  api:
    image: node:20-alpine
    container_name: devscope_api_dev
    working_dir: /app
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://devscope:devscope@postgres:5432/devscope_db
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: sh -c "npm install && npm run dev:api"
    volumes:
      - .:/app
    ports:
      - "4000:4000"

  web:
    image: node:20-alpine
    container_name: devscope_web_dev
    working_dir: /app
    depends_on:
      - api
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:4000
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    command: sh -c "npm install && npm run dev:web"
    volumes:
      - .:/app
    ports:
      - "3000:3000"

volumes:
  postgres_data_dev:
  redis_data_dev:
